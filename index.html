<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="container-logo">
          <img src="icons/dashboard.svg" />
          <div class="logo">Dashboard</div>
        </div>
        <div class="menu-modules">
          <div class="menu-option">
            <img src="icons/home.svg" class="icon" />
            Home
          </div>
          <div class="menu-option">
            <img src="icons/profile.svg" />
            Profile
          </div>
          <div class="menu-option">
            <img src="icons/messages.svg" />
            Messages
          </div>
          <div class="menu-option">
            <img src="icons/history.svg" />
            History
          </div>
          <div class="menu-option">
            <img src="icons/tasks.svg" />
            Tasks
          </div>
          <div class="menu-option">
            <img src="icons/communities.svg" />
            Communities
          </div>
        </div>
        <div class="menu-settings">
          <div class="menu-option">
            <img src="icons/settings.svg" />
            Settings
          </div>
          <div class="menu-option">
            <img src="icons/support.svg" />
            Support
          </div>
          <div class="menu-option">
            <img src="icons/privacy.svg" />
            Privacy
          </div>
        </div>
      </div>
      <header class="header">
        <div class="search-bar">
          <img src="/icons/search.svg" />
          <input type="text" name="research" id="research" />
        </div>
        <div class="user-notif">
          <img src="/icons/notification.svg" />
          <img src="/profile/pp.svg" />
          Cod Sebi
        </div>
        <div class="user-greeting">
          <img src="/profile/pp.svg" />
          <div class="greeting-message">
            <p>Hi there</p>
            Cod Sebi (@Sebi_deserto)
          </div>
        </div>
        <div class="user-actions">
          <div class="action">action 1</div>
          <div class="action">action 2</div>
          <div class="action">action 3</div>
        </div>
      </header>
      <main class="main"></main>
      <script src="script.js"></script>
    </div>
  </body>
</html>
